<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Hotel Telly</title>
  <link rel="icon" href="assests/t.images.png" />  
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  

</head>
<body>

  <div class="register-page">

    <!-- LEFT SIDE: Background image + Hotel Logo -->
    <div class="register-left">
      <div class="register-left-overlay"></div>

      <!-- Hotel Logo on top of image -->
      <a href="hotel.html" class="register-brand">
        <span class="logo-box">T</span>
        <div class="logo-text">
          <small>HOTEL</small>
          <strong>TELLY</strong>
        </div>
      </a>

    </div>

    <!-- RIGHT SIDE: White Register Form -->
    <div class="register-right">
      <div class="register-box">

        <h2>Register User</h2>
        <p class="subtitle">Create your account to get started</p>

        <form action="register.php" method="POST">

          <div class="reg-group">
            <label>Name:</label>
            <input type="text" name="name" placeholder="Your full name" required />
          </div>

          <div class="reg-group">
            <label>Email:</label>
            <input type="email" name="email" placeholder="Your email" required />
          </div>

          <div class="reg-group">
            <label>Contact:</label>
            <input type="text" name="contact" placeholder="Your phone number" required />
          </div>

          <div class="reg-group">
            <label>Password:</label>
            <input type="password" name="password" placeholder="Create a password" required />
          </div>

          <button type="submit" class="btn-register">Register</button>

        </form>

        <a href="users.php" class="view-users-link">View All Users</a>

      </div>
    </div>

  </div>

</body>
</html>
